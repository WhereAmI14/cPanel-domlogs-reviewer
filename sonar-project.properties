# SonarCloud project configuration
# Place this file in the ROOT of your repository

sonar.projectKey=ivan14sr
sonar.organization=IvanSR

# Project info
sonar.projectName=cpanel-log-analyzer
sonar.projectVersion=1.0

# Source files — tells SonarCloud what to scan
sonar.sources=hybrid,logs-reviewer.sh,logs-reviewer-ptr.sh


# Exclusions — don't scan these
sonar.exclusions=**/__pycache__/**,**/*.pyc,.git/**,**/.venv/**

# Python version
sonar.python.version=3.9