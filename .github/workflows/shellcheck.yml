name: ShellCheck

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

jobs:
  shellcheck:
    name: Run ShellCheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: "." # Scans entire repo for .sh files
          severity: warning # Fails on warnings or errors (not just errors)
